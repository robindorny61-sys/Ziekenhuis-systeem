<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>Dashboard</title>
<link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="sidebar">
<h2>🏥 Ziekenhuis</h2>

<a onclick="show('home')">Dashboard</a>
<a onclick="show('add')">Nieuwe patiënt</a>
<a onclick="show('list')">Patiënten</a>
<a onclick="show('appointments')">Afspraken</a>

<button onclick="logout()">Logout</button>
</div>

<div class="content">

<div id="home" class="section">
<h1>Dashboard</h1>
<p>Patiënten: <span id="count">0</span></p>
<p>Spoed: <span id="spoedCount">0</span></p>
</div>

<div id="add" class="section" style="display:none;">
<h1>Nieuwe patiënt</h1>

<input id="naam" placeholder="Naam"><br>
<input id="leeftijd" placeholder="Leeftijd"><br>
<input id="aandoening" placeholder="Aandoening"><br>
<input id="medicatie" placeholder="Medicatie"><br>

<button onclick="addPatient()">Opslaan</button>
</div>

<div id="list" class="section" style="display:none;">
<h1>Patiënten</h1>

<table id="table">
<tr>
<th>Naam</th><th>Leeftijd</th><th>Aandoening</th><th>Medicatie</th><th>Spoed</th>
</tr>
</table>
</div>

<div id="appointments" class="section" style="display:none;">
<h1>Afspraken</h1>

<input id="aNaam" placeholder="Naam">
<input id="aTijd" placeholder="Tijd">

<select id="aType">
<option>Normaal</option>
<option>Dringend</option>
</select>

<button onclick="addAfspraak()">Toevoegen</button>

<ul id="aList"></ul>
</div>

</div>

<script src="js/app.js"></script>

</body>
</html>
