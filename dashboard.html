<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>Dashboard</title>
<link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="sidebar">
<h2>🏥 Ziekenhuis</h2>

<a onclick="show('dashboard')">Dashboard</a>
<a onclick="show('add')">Nieuwe patiënt</a>
<a onclick="show('list')">Patiënten</a>

<button onclick="logout()">Logout</button>

</div>

<div class="content">

<div id="dashboard" class="section">
<h1>Dashboard</h1>
<p>Patiënten: <span id="count">0</span></p>
</div>

<div id="add" class="section" style="display:none;">
<h1>Nieuwe patiënt</h1>

<input id="naam" placeholder="Naam"><br><br>
<input id="leeftijd" placeholder="Leeftijd"><br><br>
<input id="aandoening" placeholder="Aandoening"><br><br>
<input id="medicatie" placeholder="Medicatie"><br><br>
<input id="verzekering" placeholder="Verzekering"><br><br>

<button onclick="addPatient()">Opslaan</button>
</div>

<div id="list" class="section" style="display:none;">
<h1>Patiënten</h1>

<table id="table"></table>

</div>

</div>

<script type="module" src="js/app.js"></script>

</body>
</html>
