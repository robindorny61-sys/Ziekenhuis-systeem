<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>Ziekenhuis Systeem</title>
<link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="sidebar">
<h2>🏥 Ziekenhuis</h2>

<a onclick="show('dashboard')">Dashboard</a>
<a onclick="show('patient')">Nieuwe patiënt</a>
<a onclick="show('lijst')">Patiënten</a>
<a onclick="show('afspraak')">Afspraken</a>
<a onclick="show('notities')">Notities</a>

</div>

<div class="content">

<!-- DASHBOARD -->
<div id="dashboard" class="section">
<h1>Dashboard</h1>

<div class="cards">
<div class="card"><h3>Patiënten</h3><p id="pCount">0</p></div>
<div class="card"><h3>Spoed</h3><p id="sCount">0</p></div>
<div class="card"><h3>Afspraken</h3><p id="aCount">0</p></div>
</div>
</div>

<!-- NIEUWE PATIENT -->
<div id="patient" class="section" style="display:none;">
<h1>Nieuwe patiënt</h1>

<input id="naam" placeholder="Naam"><br><br>
<input id="leeftijd" type="number" placeholder="Leeftijd"><br><br>
<input id="aandoening" placeholder="Aandoening"><br><br>
<input id="medicatie" placeholder="Medicatie"><br><br>
<input id="verzekeringnummer" placeholder="Verzekeringnummer"><br><br>
<input id="kamernummer ZH" placeholder="kamernummer ZH"><br><br>


<button onclick="addPatient()">Opslaan</button>

</div>

<!-- PATIENT LIJST -->
<div id="lijst" class="section" style="display:none;">
<h1>Patiënten</h1>

<table id="table">
<tr>
<th>Naam</th>
<th>Leeftijd</th>
<th>Aandoening</th>
<th>Medicatie</th>
<th>Verzekering</th>
<th>Spoed</th>
</tr>
</table>

</div>

<!-- AFSPRAKEN -->
<div id="afspraak" class="section" style="display:none;">
<h1>Afspraken</h1>

<input id="aNaam" placeholder="Naam patiënt"><br><br>

<select id="aType">
<option>Normaal</option>
<option>spoed</option>
</select><br><br>

<input id="aTijd" placeholder="Tijd bv 14:00"><br><br>

<button onclick="addAfspraak()">Toevoegen</button>

<ul id="aList"></ul>

</div>

<!-- NOTITIES -->
<div id="notities" class="section" style="display:none;">
<h1>Dokter Notities</h1>

<textarea id="note" placeholder="Schrijf hier..." style="width:100%;height:100px;"></textarea><br><br>

<button onclick="saveNote()">Opslaan</button>

<ul id="noteList"></ul>

</div>

</div>

<script src="js/app.js"></script>

</body>
</html>
