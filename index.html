<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>Ziekenhuis Systeem PRO</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}
body{background:#eef2f7;}

header{
background:#1e293b;color:white;padding:15px 25px;
display:flex;justify-content:space-between;
}

.container{display:flex;}

.sidebar{
width:240px;background:#0f172a;color:white;height:100vh;padding:20px;
}

.sidebar button{
width:100%;padding:12px;margin-bottom:10px;
background:#1e293b;border:none;color:white;
cursor:pointer;border-radius:8px;
}

.sidebar button:hover{background:#2563eb;}

.content{flex:1;padding:25px;}

.card{
background:white;padding:20px;border-radius:12px;
box-shadow:0 4px 10px rgba(0,0,0,0.05);
margin-bottom:20px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
margin-bottom:20px;
}

input, select{
width:100%;padding:10px;margin-top:10px;
border-radius:8px;border:1px solid #ccc;
}

button.main{
background:#2563eb;color:white;padding:10px;
border:none;border-radius:8px;margin-top:10px;cursor:pointer;
}

table{
width:100%;border-collapse:collapse;margin-top:10px;
}

td,th{
padding:10px;border-bottom:1px solid #ddd;
}

.section{display:none;}
.active{display:block;}
</style>

</head>

<body>

<header>
<h2>🏥 Ziekenhuis Systeem</h2>
<span>PRO Dashboard</span>
</header>

<div class="container">

<div class="sidebar">
<button onclick="show('dashboard')">Dashboard</button>
<button onclick="show('add')">Nieuwe patiënt</button>
<button onclick="show('patients')">Patiënten</button>
<button onclick="show('rooms')">Kamers</button>
<button onclick="show('appointments')">Afspraken</button>
</div>

<div class="content">

<!-- DASHBOARD -->
<div id="dashboard" class="section active">
<div class="grid">
<div class="card">
<h3>Patiënten</h3>
<h1 id="count">0</h1>
</div>

<div class="card">
<h3>Spoed</h3>
<h1 id="spoed">0</h1>
</div>

<div class="card">
<h3>Vrije kamers</h3>
<h1 id="freeRooms">0</h1>
</div>
</div>
</div>

<!-- ADD -->
<div id="add" class="section">
<div class="card">
<h2>Nieuwe patiënt</h2>

<input id="naam" placeholder="Naam">
<input id="leeftijd" placeholder="Leeftijd">
<input id="aandoening" placeholder="Aandoening">
<input id="medicatie" placeholder="Medicatie">
<input id="verzekering" placeholder="Verzekering">

<button class="main" onclick="addPatient()">Opslaan</button>
</div>
</div>

<!-- PATIENTS -->
<div id="patients" class="section">
<div class="card">
<h2>Patiënten</h2>
<table id="table"></table>
</div>
</div>

<!-- ROOMS -->
<div id="rooms" class="section">
<div class="card">
<h2>Kamers</h2>
<div id="roomList"></div>
</div>
</div>

<!-- APPOINTMENTS -->
<div id="appointments" class="section">
<div class="card">
<h2>Afspraken</h2>

<input id="aNaam" placeholder="Naam">
<input id="aDatum" placeholder="Datum">

<select id="aType">
<option>Normaal</option>
<option>Dringend</option>
<option>Spoed</option>
</select>

<button class="main" onclick="addAppointment()">Toevoegen</button>

<ul id="aList"></ul>
</div>
</div>

</div>
</div>

<script>

/* DATA */
let patients = [];
let rooms = [
{nr:101, bezet:false},
{nr:102, bezet:false},
{nr:103, bezet:false},
{nr:104, bezet:false}
];
let afspraken = [];

/* NAV */
function show(id){
document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
document.getElementById(id).classList.add("active");
render();
}

/* ADD PATIENT */
function addPatient(){

let p = {
naam: v("naam"),
leeftijd: v("leeftijd"),
aandoening: v("aandoening"),
medicatie: v("medicatie"),
verzekering: v("verzekering"),
spoed:false,
kamer:null,
notities:[]
};

patients.push(p);
render();
alert("Opgeslagen!");
}

/* SPOED */
function toggleSpoed(i){
patients[i].spoed = !patients[i].spoed;
render();
}

/* DELETE */
function del(i){
patients.splice(i,1);
render();
}

/* ROOM ASSIGN */
function giveRoom(i){

let free = rooms.find(r=>!r.bezet);

if(!free){
alert("Geen kamers vrij!");
return;
}

free.bezet = true;
patients[i].kamer = free.nr;
render();
}

/* ROOM FREE */
function freeRoom(i){

let nr = patients[i].kamer;
let room = rooms.find(r=>r.nr==nr);

if(room) room.bezet = false;

patients[i].kamer = null;
render();
}

/* NOTE */
function note(i){
let n = prompt("Notitie:");
if(n) patients[i].notities.push(n);
}

/* RENDER */
function render(){

/* TABLE */
let table = document.getElementById("table");

if(table){
table.innerHTML = `
<tr>
<th>Naam</th><th>Leeftijd</th><th>Aandoening</th>
<th>Kamer</th><th>Status</th><th>Acties</th>
</tr>
`;

let spoed = 0;

patients.forEach((p,i)=>{

let r = table.insertRow();

r.insertCell(0).innerText=p.naam;
r.insertCell(1).innerText=p.leeftijd;
r.insertCell(2).innerText=p.aandoening;
r.insertCell(3).innerText=p.kamer || "Geen";

let btn = document.createElement("button");
btn.innerText = p.spoed ? "🚨 SPOED":"Normaal";
btn.onclick=()=>toggleSpoed(i);

if(p.spoed) spoed++;

r.insertCell(4).appendChild(btn);

let acties = document.createElement("div");

/* kamer */
let roomBtn = document.createElement("button");
roomBtn.innerText = p.kamer ? "Vrijmaken":"Kamer";
roomBtn.onclick=()=>p.kamer?freeRoom(i):giveRoom(i);

/* note */
let noteBtn = document.createElement("button");
noteBtn.innerText="📝";
noteBtn.onclick=()=>note(i);

/* delete */
let delBtn = document.createElement("button");
delBtn.innerText="❌";
delBtn.onclick=()=>del(i);

acties.appendChild(roomBtn);
acties.appendChild(noteBtn);
acties.appendChild(delBtn);

r.insertCell(5).appendChild(acties);

});

document.getElementById("count").innerText = patients.length;
document.getElementById("spoed").innerText = spoed;
}

/* ROOMS */
let div = document.getElementById("roomList");

if(div){
div.innerHTML="";
let free = 0;

rooms.forEach(r=>{
let box = document.createElement("div");
box.innerText = "Kamer "+r.nr+" - "+(r.bezet?"Bezet":"Vrij");
box.style.padding="10px";
box.style.margin="5px";
box.style.borderRadius="8px";
box.style.background = r.bezet?"#fecaca":"#bbf7d0";

if(!r.bezet) free++;

div.appendChild(box);
});

document.getElementById("freeRooms").innerText = free;
}

/* AFSPRAKEN */
let ul = document.getElementById("aList");

if(ul){
ul.innerHTML="";
afspraken.forEach(a=>{
let li = document.createElement("li");
li.innerText = a.datum+" - "+a.naam+" ("+a.type+")";
if(a.type==="Spoed") li.style.color="red";
ul.appendChild(li);
});
}

}

/* ADD AFSPRAAK */
function addAppointment(){

let a = {
naam:v("aNaam"),
datum:v("aDatum"),
type:document.getElementById("aType").value
};

afspraken.push(a);
render();
}

/* HELPER */
function v(id){
return document.getElementById(id).value;
}

</script>

</body>
</html>
