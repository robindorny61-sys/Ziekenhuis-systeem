<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>Dokter Portaal</title>
<link rel="stylesheet" href="css/style.css">
</head>

<body class="login-body">

<div class="login-container">

<h1>Inlog Verpleging</h1>

<input type="text" id="user" placeholder="Gebruikersnaam">
<input type="password" id="pass" placeholder="Wachtwoord">

<button class="login-btn" onclick="login()">Inloggen</button>

</div>

<script>

function login(){

var username = document.getElementById("user").value;
var password = document.getElementById("pass").value;

if(username === "dokter" && password === "1234"){

window.location.href = "dashboard.html";

}

else{

alert("Foute login");

}

}

</script>

</body>
</html>
