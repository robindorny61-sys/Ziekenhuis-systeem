<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>Het Ziekenhuissysteem</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Segoe UI;}
body{background:#0f172a;color:white;}

header{
display:flex;justify-content:space-between;
padding:15px;background:#1e293b;
}

.container{display:flex;}

.sidebar{
width:230px;height:100vh;background:#020617;padding:15px;
}

.sidebar button{
width:100%;padding:10px;margin:5px 0;
border:none;background:#1e293b;color:white;border-radius:8px;
}

.content{flex:1;padding:20px;}

.card{
background:#1e293b;padding:15px;border-radius:10px;margin-bottom:15px;
}

input,select{
width:100%;padding:10px;margin:5px 0;
border-radius:8px;border:none;
}

button{
padding:8px;border:none;border-radius:6px;background:#3b82f6;color:white;
}

.section{display:none;}
.active{display:block;}

#login{
display:flex;justify-content:center;align-items:center;height:100vh;
}

.login-box{
background:#020617;padding:20px;border-radius:10px;width:300px;
}

#modal{
position:fixed;top:0;left:0;width:100%;height:100%;
background:rgba(0,0,0,0.7);
display:none;justify-content:center;align-items:center;
}

.modal{
background:#020617;padding:20px;border-radius:10px;width:400px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
<div class="login-box">
<h2>Login</h2>
<input id="user" placeholder="Gebruiker">
<input id="pass" type="password" placeholder="Wachtwoord">
<button onclick="login()">Login</button>
</div>
</div>

<!-- APP -->
<div id="app" style="display:none;">

<header>
<div>🏥 Het Ziekenhuissysteem</div>
<button onclick="logout()">Logout</button>
</header>

<div class="container">

<div class="sidebar">
<button onclick="show('dashboard')">Dashboard</button>
<button onclick="show('patients')">Patiënten</button>
<button onclick="show('checks')">Checks</button>
<button onclick="show('rooms')">Kamers</button>
</div>

<div class="content">

<!-- DASHBOARD -->
<div id="dashboard" class="section active">
<div class="card">
<h2>Dashboard</h2>
<p>Patiënten: <span id="count"></span></p>
</div>
</div>

<!-- PATIENTS -->
<div id="patients" class="section">
<div class="card">

<h2>Patiënten</h2>

<input id="search" placeholder="Zoek..." oninput="render()">

<input id="naam" placeholder="Naam">
<input id="leeftijd" placeholder="Leeftijd">
<input id="aandoening" placeholder="Aandoening">
<input id="datum" type="date">

<button onclick="addPatient()">➕ Toevoegen</button>

<div id="patientList"></div>

</div>
</div>

<!-- CHECKS -->
<div id="checks" class="section">
<div class="card">

<h2>Dagelijkse checks</h2>

<select id="patientSelect"></select>
<input id="checkText" placeholder="Controle">
<button onclick="addCheck()">Opslaan</button>

<div id="checkList"></div>

</div>
</div>

<!-- ROOMS -->
<div id="rooms" class="section">
<div class="card">

<h2>Kamers</h2>
<button onclick="addRoom()">➕ Kamer</button>
<div id="roomList"></div>

</div>
</div>

</div>
</div>

</div>

<!-- MODAL -->
<div id="modal">
<div class="modal">
<div id="detail"></div>
<button onclick="closeModal()">Sluiten</button>
</div>
</div>

<script>

/* LOGIN FIXED */
if(localStorage.getItem("login")){
document.getElementById("login").style.display="none";
document.getElementById("app").style.display="block";
}

function login(){
let u = document.getElementById("user").value;
let p = document.getElementById("pass").value;

if((u=="admin"||u=="dokter") && p=="1234"){
localStorage.setItem("login", true);

document.getElementById("login").style.display="none";
document.getElementById("app").style.display="block";

}else{
alert("Foute login");
}
}

function logout(){
localStorage.removeItem("login");
location.reload();
}

/* DATA */
let patients=JSON.parse(localStorage.getItem("patients"))||[];
let rooms=JSON.parse(localStorage.getItem("rooms"))||[];

/* SAVE */
function save(){
localStorage.setItem("patients",JSON.stringify(patients));
localStorage.setItem("rooms",JSON.stringify(rooms));
}

/* NAV */
function show(id){
document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
document.getElementById(id).classList.add("active");
render();
}

/* ADD PATIENT */
function addPatient(){
patients.push({
naam:document.getElementById("naam").value,
leeftijd:document.getElementById("leeftijd").value,
aandoening:document.getElementById("aandoening").value,
datum:document.getElementById("datum").value,
medicatie:[],
checks:[]
});
save();render();
}

/* RENDER */
function render(){

let searchInput=document.getElementById("search");
let q=searchInput?searchInput.value.toLowerCase():"";

/* LIST */
let list=document.getElementById("patientList");
if(list){
list.innerHTML="";

patients
.map((p,i)=>({p,i}))
.filter(x=>x.p.naam.toLowerCase().includes(q))
.forEach(x=>{

let div=document.createElement("div");

div.innerHTML=`
<b>${x.p.naam}</b> (${x.p.leeftijd})<br>
${x.p.aandoening}<br>
<button onclick="openDetail(${x.i})">👁️</button>
<hr>
`;

list.appendChild(div);

});
}

/* SELECT */
let sel=document.getElementById("patientSelect");
if(sel){
sel.innerHTML="";
patients.forEach((p,i)=>{
let o=document.createElement("option");
o.value=i;o.innerText=p.naam;
sel.appendChild(o);
});
}

/* CHECKS */
let cl=document.getElementById("checkList");
if(cl){
cl.innerHTML="";
patients.forEach(p=>{
p.checks.forEach(c=>{
let d=document.createElement("div");
d.innerText=c.datum+" - "+p.naam+": "+c.text;
cl.appendChild(d);
});
});
}

/* ROOMS */
let rl=document.getElementById("roomList");
if(rl){
rl.innerHTML="";
rooms.forEach((r,i)=>{
let d=document.createElement("div");
d.innerText=`Kamer ${r.nr} (${r.bezet}/${r.cap})`;
rl.appendChild(d);
});
}

/* COUNT */
document.getElementById("count").innerText=patients.length;
}

/* DETAIL */
function openDetail(i){
let p=patients[i];

document.getElementById("detail").innerHTML=`
<h3>${p.naam}</h3>
Leeftijd: ${p.leeftijd}<br>
Aandoening: ${p.aandoening}<br>

<h4>Medicatie</h4>
<button onclick="addMed(${i})">➕</button>
${p.medicatie.join("<br>")}

<h4>Checks</h4>
<button onclick="addCheckDirect(${i})">➕</button>
${p.checks.map(c=>c.datum+" - "+c.text).join("<br>")}
`;

document.getElementById("modal").style.display="flex";
}

function closeModal(){
document.getElementById("modal").style.display="none";
}

/* EXTRA */
function addMed(i){
let m=prompt("Medicatie");
if(m){
patients[i].medicatie.push(m);
save();
openDetail(i);
}
}

function addCheckDirect(i){
let t=prompt("Check");
if(t){
patients[i].checks.push({
datum:new Date().toLocaleDateString(),
text:t
});
save();
openDetail(i);
}
}

function addCheck(){
let i=document.getElementById("patientSelect").value;
patients[i].checks.push({
datum:new Date().toLocaleDateString(),
text:document.getElementById("checkText").value
});
save();render();
}

function addRoom(){
let nr=prompt("nr");
let cap=prompt("cap");
rooms.push({nr,cap:Number(cap),bezet:0});
save();render();
}

render();

</script>

</body>
</html>
