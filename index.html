<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>Ziekenhuis Systeem ULTRA</title>

<style>
body{font-family:Arial;margin:0;background:#eef2f7;}
header{background:#1e293b;color:white;padding:15px;}
.container{display:flex;}
.sidebar{width:230px;background:#0f172a;color:white;height:100vh;padding:15px;}
.sidebar button{width:100%;padding:10px;margin:5px 0;background:#1e293b;color:white;border:none;cursor:pointer;}
.sidebar button:hover{background:#2563eb;}
.content{flex:1;padding:20px;}
.card{background:white;padding:15px;border-radius:10px;margin-bottom:20px;}
input,select{width:100%;padding:10px;margin:5px 0;}
button{padding:8px;margin:2px;cursor:pointer;}
table{width:100%;border-collapse:collapse;}
td,th{padding:10px;border-bottom:1px solid #ccc;}
.section{display:none;}
.active{display:block;}
</style>

</head>

<body>

<header>🏥 Ziekenhuis Systeem</header>

<div class="container">

<div class="sidebar">
<button onclick="show('dashboard')">Dashboard</button>
<button onclick="show('addPatient')">Nieuwe patiënt</button>
<button onclick="show('patients')">Patiënten</button>
<button onclick="show('rooms')">Kamers</button>
<button onclick="show('appointments')">Afspraken</button>
</div>

<div class="content">

<div id="dashboard" class="section active">
<div class="card">
<h2>Dashboard</h2>
<p>Patiënten: <span id="count">0</span></p>
<p>Spoed: <span id="spoed">0</span></p>
</div>
</div>

<div id="addPatient" class="section">
<div class="card">
<h2>Nieuwe patiënt</h2>
<input id="naam" placeholder="Naam">
<input id="leeftijd" placeholder="Leeftijd">
<input id="aandoening" placeholder="Aandoening">
<input id="verzekering" placeholder="Verzekering">
<button onclick="addPatient()">Opslaan</button>
</div>
</div>

<div id="patients" class="section">
<div class="card">
<h2>Patiënten</h2>
<table id="table"></table>
</div>
</div>

<div id="rooms" class="section">
<div class="card">
<h2>Kamers</h2>
<button onclick="addRoom()">➕ Kamer toevoegen</button>
<div id="roomList"></div>
</div>
</div>

<div id="appointments" class="section">
<div class="card">
<h2>Afspraken</h2>
<input id="aNaam" placeholder="Naam">
<input id="aDatum" placeholder="Datum">
<select id="aType">
<option>Normaal</option>
<option>Spoed</option>
</select>
<button onclick="addAppointment()">Toevoegen</button>
<ul id="aList"></ul>
</div>
</div>

</div>
</div>

<script>

/* DATA */
let patients = [];
let rooms = [];
let afspraken = [];

/* NAV */
function show(id){
document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
document.getElementById(id).classList.add("active");
render();
}

/* PATIENT */
function addPatient(){
patients.push({
naam:v("naam"),
leeftijd:v("leeftijd"),
aandoening:v("aandoening"),
verzekering:v("verzekering"),
spoed:false,
kamer:null,
dagboek:[],
medicatie:[]
});
render();
}

function toggleSpoed(i){
patients[i].spoed=!patients[i].spoed;
render();
}

function delPatient(i){
patients.splice(i,1);
render();
}

function addDagboek(i){
let t=prompt("Dagboek:");
if(t) patients[i].dagboek.push(t);
}

function addMedicatie(i){
let t=prompt("Medicatie:");
if(t) patients[i].medicatie.push(t);
}

/* ROOMS */
function addRoom(){
let nr=prompt("Kamer nr:");
let cap=prompt("Capaciteit:");
rooms.push({nr,cap:Number(cap),bezet:0});
render();
}

function editRoom(i){
let cap=prompt("Nieuwe cap:",rooms[i].cap);
rooms[i].cap=Number(cap);
render();
}

function delRoom(i){
rooms.splice(i,1);
render();
}

function giveRoom(i){
let r=rooms.find(x=>x.bezet<x.cap);
if(!r) return alert("Geen plaats");
r.bezet++;
patients[i].kamer=r.nr;
render();
}

function freeRoom(i){
let r=rooms.find(x=>x.nr==patients[i].kamer);
if(r) r.bezet--;
patients[i].kamer=null;
render();
}

/* AFSPRAKEN */
function addAppointment(){
afspraken.push({
naam:v("aNaam"),
datum:v("aDatum"),
type:document.getElementById("aType").value
});
render();
}

/* RENDER */
function render(){

/* PATIENT TABLE */
let t=document.getElementById("table");
if(t){
t.innerHTML=`<tr>
<th>Naam</th><th>Leeftijd</th><th>Kamer</th>
<th>Status</th><th>Acties</th></tr>`;

let spoed=0;

patients.forEach((p,i)=>{
let r=t.insertRow();

r.insertCell(0).innerText=p.naam;
r.insertCell(1).innerText=p.leeftijd;
r.insertCell(2).innerText=p.kamer||"Geen";

let s=document.createElement("button");
s.innerText=p.spoed?"🚨":"OK";
s.onclick=()=>toggleSpoed(i);
if(p.spoed) spoed++;

r.insertCell(3).appendChild(s);

let d=document.createElement("div");

let room=document.createElement("button");
room.innerText=p.kamer?"Vrij":"Kamer";
room.onclick=()=>p.kamer?freeRoom(i):giveRoom(i);

let dag=document.createElement("button");
dag.innerText="📖";
dag.onclick=()=>addDagboek(i);

let med=document.createElement("button");
med.innerText="💊";
med.onclick=()=>addMedicatie(i);

let del=document.createElement("button");
del.innerText="❌";
del.onclick=()=>delPatient(i);

d.append(room,dag,med,del);
r.insertCell(4).appendChild(d);
});

document.getElementById("count").innerText=patients.length;
document.getElementById("spoed").innerText=spoed;
}

/* ROOMS */
let rl=document.getElementById("roomList");
if(rl){
rl.innerHTML="";
rooms.forEach((r,i)=>{
let div=document.createElement("div");
div.innerHTML=`Kamer ${r.nr} (${r.bezet}/${r.cap})`;
div.style.background=r.bezet>=r.cap?"#fca5a5":"#86efac";

let e=document.createElement("button");
e.innerText="✏️";
e.onclick=()=>editRoom(i);

let d=document.createElement("button");
d.innerText="❌";
d.onclick=()=>delRoom(i);

div.append(e,d);
rl.appendChild(div);
});
}

/* AFSPRAKEN */
let ul=document.getElementById("aList");
if(ul){
ul.innerHTML="";
afspraken.forEach(a=>{
let li=document.createElement("li");
li.innerText=a.datum+" "+a.naam+" ("+a.type+")";
if(a.type==="Spoed") li.style.color="red";
ul.appendChild(li);
});
}

}

/* HELPER */
function v(id){return document.getElementById(id).value;}

</script>

</body>
</html>
