<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>Het Ziekenhuissysteem ULTIMATE</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif;}
body{
background:linear-gradient(135deg,#0f172a,#1e293b);
color:#e2e8f0;
}

/* HEADER */
header{
display:flex;justify-content:space-between;
padding:15px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(10px);
}

/* LAYOUT */
.container{display:flex;}

.sidebar{
width:250px;
height:100vh;
padding:20px;
background:rgba(255,255,255,0.03);
}

.sidebar button{
width:100%;
padding:12px;
margin-bottom:10px;
border:none;
border-radius:12px;
background:transparent;
color:#cbd5f5;
cursor:pointer;
}

.sidebar button:hover{
background:#3b82f6;
color:white;
}

/* CONTENT */
.content{flex:1;padding:25px;}

.card{
background:rgba(255,255,255,0.05);
padding:20px;
border-radius:20px;
margin-bottom:20px;
}

/* INPUT */
input,select{
width:100%;
padding:12px;
margin:8px 0;
border-radius:12px;
border:none;
background:rgba(255,255,255,0.08);
color:white;
}

/* BUTTON */
button{
padding:10px;
border:none;
border-radius:10px;
cursor:pointer;
background:linear-gradient(135deg,#3b82f6,#6366f1);
color:white;
}

/* LIST */
#patientList div{
background:rgba(255,255,255,0.04);
padding:15px;
border-radius:15px;
margin-top:10px;
}

/* LOGIN */
#login{
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.login-box{
background:#020617;
padding:25px;
border-radius:15px;
width:300px;
}

/* MODAL */
#modal{
position:fixed;
top:0;left:0;width:100%;height:100%;
background:rgba(0,0,0,0.7);
display:none;
justify-content:center;
align-items:center;
}

.modal{
background:#020617;
padding:20px;
border-radius:15px;
width:400px;
max-height:80vh;
overflow:auto;
}

/* SECTIONS */
.section{display:none;}
.active{display:block;}
</style>

</head>

<body>

<!-- LOGIN -->
<div id="login">
<div class="login-box">
<h2>Login</h2>
<input id="user" placeholder="Gebruiker">
<input id="pass" type="password" placeholder="Wachtwoord">
<button onclick="login()">Login</button>
</div>
</div>

<!-- APP -->
<div id="app" style="display:none;">

<header>
<div>🏥 Het Ziekenhuissysteem</div>
<button onclick="logout()">Logout</button>
</header>

<div class="container">

<div class="sidebar">
<button onclick="show('dashboard')">Dashboard</button>
<button onclick="show('patients')">Patiënten</button>
<button onclick="show('checks')">Dagelijkse checks</button>
<button onclick="show('rooms')">Kamers</button>
</div>

<div class="content">

<!-- DASHBOARD -->
<div id="dashboard" class="section active">
<div class="card">
<h2>Dashboard</h2>
<p>Patiënten: <span id="count"></span></p>
</div>
</div>

<!-- PATIENTS -->
<div id="patients" class="section">
<div class="card">

<h2>Patiënten</h2>

<input id="search" placeholder="Zoek..." oninput="render()">

<input id="naam" placeholder="Naam">
<input id="leeftijd" placeholder="Leeftijd">
<input id="aandoening" placeholder="Aandoening">
<input id="datum" type="date">

<button onclick="addPatient()">➕ Toevoegen</button>

<div id="patientList"></div>

</div>
</div>

<!-- CHECKS -->
<div id="checks" class="section">
<div class="card">

<h2>Dagelijkse checks</h2>

<select id="patientSelect"></select>
<input id="checkText" placeholder="Controle">
<button onclick="addCheck()">Opslaan</button>

<div id="checkList"></div>

</div>
</div>

<!-- ROOMS -->
<div id="rooms" class="section">
<div class="card">

<h2>Kamers</h2>
<button onclick="addRoom()">➕ Kamer</button>
<div id="roomList"></div>

</div>
</div>

</div>
</div>

</div>

<!-- MODAL -->
<div id="modal">
<div class="modal">
<div id="detail"></div>
<button onclick="closeModal()">Sluiten</button>
</div>
</div>

<script>

/* LOGIN */
if(localStorage.getItem("login")) loginSuccess();

function login(){
if((user.value=="admin"||user.value=="dokter") && pass.value=="1234"){
localStorage.setItem("login",true);
loginSuccess();
}else alert("Fout");
}

function loginSuccess(){
login.style.display="none";
app.style.display="block";
}

function logout(){
localStorage.removeItem("login");
location.reload();
}

/* DATA */
let patients=JSON.parse(localStorage.getItem("patients"))||[];
let rooms=JSON.parse(localStorage.getItem("rooms"))||[];

/* SAVE */
function save(){
localStorage.setItem("patients",JSON.stringify(patients));
localStorage.setItem("rooms",JSON.stringify(rooms));
}

/* NAV */
function show(id){
document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
document.getElementById(id).classList.add("active");
render();
}

/* ADD PATIENT */
function addPatient(){
patients.push({
naam:naam.value,
leeftijd:leeftijd.value,
aandoening:aandoening.value,
datum:datum.value,
medicatie:[],
checks:[]
});
save();render();
}

/* RENDER */
function render(){

let searchInput=document.getElementById("search");
let q=searchInput?searchInput.value.toLowerCase():"";

/* LIST */
patientList.innerHTML="";

patients
.map((p,i)=>({p,i}))
.filter(x=>x.p.naam.toLowerCase().includes(q))
.forEach(x=>{

let div=document.createElement("div");

div.innerHTML=`
<b>${x.p.naam}</b> (${x.p.leeftijd})<br>
${x.p.aandoening}<br>
<button onclick="openDetail(${x.i})">👁️</button>
`;

patientList.appendChild(div);

});

/* SELECT */
patientSelect.innerHTML="";
patients.forEach((p,i)=>{
let o=document.createElement("option");
o.value=i;o.innerText=p.naam;
patientSelect.appendChild(o);
});

/* CHECKS */
checkList.innerHTML="";
patients.forEach(p=>{
p.checks.forEach(c=>{
let d=document.createElement("div");
d.innerText=c.datum+" - "+p.naam+": "+c.text;
checkList.appendChild(d);
});
});

/* ROOMS */
roomList.innerHTML="";
rooms.forEach((r,i)=>{
let d=document.createElement("div");
d.innerText=`Kamer ${r.nr} (${r.bezet}/${r.cap})`;
roomList.appendChild(d);
});

count.innerText=patients.length;
}

/* DETAIL */
function openDetail(i){
let p=patients[i];

detail.innerHTML=`
<h3>${p.naam}</h3>
Leeftijd: ${p.leeftijd}<br>
Aandoening: ${p.aandoening}<br>

<h4>Medicatie</h4>
<button onclick="addMed(${i})">➕</button>
${p.medicatie.join("<br>")}

<h4>Checks</h4>
<button onclick="addCheckDirect(${i})">➕</button>
${p.checks.map(c=>c.datum+" - "+c.text).join("<br>")}
`;

modal.style.display="flex";
}

function closeModal(){modal.style.display="none";}

/* EXTRA */
function addMed(i){
let m=prompt("Medicatie");
if(m){patients[i].medicatie.push(m);save();openDetail(i);}
}

function addCheckDirect(i){
let t=prompt("Check");
if(t){
patients[i].checks.push({
datum:new Date().toLocaleDateString(),
text:t
});
save();openDetail(i);
}
}

function addCheck(){
let i=patientSelect.value;
patients[i].checks.push({
datum:new Date().toLocaleDateString(),
text:checkText.value
});
save();render();
}

function addRoom(){
let nr=prompt("nr");
let cap=prompt("cap");
rooms.push({nr,cap:Number(cap),bezet:0});
save();render();
}

render();

</script>

</body>
</html>
