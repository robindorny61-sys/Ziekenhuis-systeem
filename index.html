<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>Login</title>
<link rel="stylesheet" href="css/style.css">
</head>

<body class="login-body">

<div class="login-container">

<h1>🔐 Login</h1>

<input id="loginUser" placeholder="Gebruikersnaam">
<input id="loginPass" type="password" placeholder="Wachtwoord">

<button onclick="login()">Login</button>

<hr>

<h3>Account maken</h3>

<input id="regUser" placeholder="Nieuwe gebruiker">
<input id="regPass" type="password" placeholder="Nieuw wachtwoord">

<button onclick="register()">Registreer</button>

</div>

<script src="js/auth.js"></script>

</body>
</html>
