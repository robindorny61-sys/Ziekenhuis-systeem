<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>Het Ziekenhuissysteem</title>

<style>
body{margin:0;font-family:Arial;background:#eef2f7;}
header{background:#1e3a8a;color:white;padding:15px;font-size:20px;}

.container{display:flex;}

.sidebar{
width:230px;background:#0f172a;color:white;height:100vh;padding:15px;
}

.sidebar button{
width:100%;padding:10px;margin:5px 0;
background:#1e293b;color:white;border:none;cursor:pointer;
}

.content{flex:1;padding:20px;}

.card{
background:white;padding:15px;border-radius:10px;margin-bottom:15px;
}

input{width:100%;padding:10px;margin:5px 0;}

button{padding:8px;margin:2px;}

.section{display:none;}
.active{display:block;}

#login{
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.login-box{
background:white;padding:20px;border-radius:10px;width:300px;
}
</style>

</head>

<body>

<!-- LOGIN -->
<div id="login">
<div class="login-box">
<h2>Login</h2>
<input id="user" placeholder="Gebruiker">
<input id="pass" type="password" placeholder="Wachtwoord">
<button onclick="login()">Login</button>
</div>
</div>

<!-- APP -->
<div id="app" style="display:none;">

<header>🏥 Het Ziekenhuissysteem</header>

<div class="container">

<div class="sidebar">
<button onclick="show('dashboard')">Dashboard</button>
<button onclick="show('add')">Nieuwe patiënt</button>
<button onclick="show('patients')">Patiënten</button>
<button onclick="show('checks')">Dagelijkse checks</button>
</div>

<div class="content">

<div id="dashboard" class="section active">
<div class="card">
<h2>Dashboard</h2>
<p>Patiënten: <span id="count"></span></p>
</div>
</div>

<div id="add" class="section">
<div class="card">
<h2>Nieuwe patiënt</h2>
<input id="naam" placeholder="Naam">
<input id="leeftijd" placeholder="Leeftijd">
<input id="aandoening" placeholder="Aandoening">
<input id="datum" type="date">
<button onclick="addPatient()">Opslaan</button>
</div>
</div>

<div id="patients" class="section">
<div class="card">
<h2>Patiënten</h2>
<div id="patientList"></div>
</div>
</div>

<div id="checks" class="section">
<div class="card">
<h2>Dagelijkse checks</h2>

<select id="patientSelect"></select>
<input id="checkText" placeholder="Controle">
<button onclick="addCheck()">Opslaan</button>

<h3>Overzicht per dag</h3>
<div id="checkList"></div>
</div>
</div>

</div>
</div>
</div>

<script>

/* LOGIN */
function login(){
let u=document.getElementById("user").value;
let p=document.getElementById("pass").value;

if((u=="admin"||u=="dokter") && p=="1234"){
document.getElementById("login").style.display="none";
document.getElementById("app").style.display="block";
}else{
alert("Fout!");
}
}

/* DATA */
let patients = JSON.parse(localStorage.getItem("patients")) || [];

/* SAVE */
function save(){
localStorage.setItem("patients", JSON.stringify(patients));
}

/* NAV */
function show(id){
document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
document.getElementById(id).classList.add("active");
render();
}

/* ADD PATIENT */
function addPatient(){
patients.push({
naam:v("naam"),
leeftijd:v("leeftijd"),
aandoening:v("aandoening"),
datum:v("datum"),
checks:[]
});
save();
render();
}

/* RENDER */
function render(){

/* PATIENT LIST */
let list=document.getElementById("patientList");
if(list){
list.innerHTML="";
patients.forEach((p,i)=>{
let div=document.createElement("div");
div.innerHTML=`
<b>${p.naam}</b><br>
Leeftijd: ${p.leeftijd}<br>
Opname: ${p.datum}<br>
<hr>
`;
list.appendChild(div);
});
}

/* SELECT */
let sel=document.getElementById("patientSelect");
if(sel){
sel.innerHTML="";
patients.forEach((p,i)=>{
let o=document.createElement("option");
o.value=i;
o.innerText=p.naam;
sel.appendChild(o);
});
}

/* CHECK LIST */
let cl=document.getElementById("checkList");
if(cl){
cl.innerHTML="";
patients.forEach(p=>{
p.checks.forEach(c=>{
let div=document.createElement("div");
div.innerText = c.datum+" - "+p.naam+": "+c.text;
cl.appendChild(div);
});
});
}

/* COUNT */
document.getElementById("count").innerText=patients.length;
}

/* ADD CHECK */
function addCheck(){

let i=document.getElementById("patientSelect").value;

patients[i].checks.push({
datum:new Date().toLocaleDateString(),
text:v("checkText")
});

save();
render();
}

/* HELPER */
function v(id){
return document.getElementById(id).value;
}

render();

</script>

</body>
</html>
