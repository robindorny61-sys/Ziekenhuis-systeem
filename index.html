<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>Het Ziekenhuissysteem PRO MAX</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI';}
body{background:#eef2f7;}

header{
background:#1e3a8a;color:white;padding:15px;font-size:20px;
display:flex;justify-content:space-between;
}

.container{display:flex;}

.sidebar{
width:240px;background:#0f172a;color:white;height:100vh;padding:15px;
}

.sidebar button{
width:100%;padding:12px;margin:6px 0;
background:#1e293b;border:none;color:white;border-radius:8px;
}

.sidebar button:hover{background:#2563eb;}

.content{flex:1;padding:20px;}

.card{
background:white;padding:15px;border-radius:10px;
margin-bottom:20px;
}

input{
width:100%;padding:10px;margin:5px 0;
border-radius:8px;border:1px solid #ccc;
}

button{padding:8px;border:none;border-radius:6px;cursor:pointer;}

.section{display:none;}
.active{display:block;}

#login{
display:flex;justify-content:center;align-items:center;height:100vh;
}

.login-box{
background:white;padding:20px;border-radius:10px;width:300px;
}

#modal{
position:fixed;top:0;left:0;width:100%;height:100%;
background:rgba(0,0,0,0.5);
display:none;justify-content:center;align-items:center;
}

.modal-box{
background:white;padding:20px;border-radius:10px;width:400px;
}
</style>

</head>

<body>

<!-- LOGIN -->
<div id="login">
<div class="login-box">
<h2>Login</h2>
<input id="user" placeholder="Gebruiker">
<input id="pass" type="password" placeholder="Wachtwoord">
<button onclick="login()">Login</button>
</div>
</div>

<!-- APP -->
<div id="app" style="display:none;">

<header>
🏥 Het Ziekenhuissysteem
<button onclick="logout()">Logout</button>
</header>

<div class="container">

<div class="sidebar">
<button onclick="show('dashboard')">Dashboard</button>
<button onclick="show('patients')">Patiënten</button>
<button onclick="show('rooms')">Kamers</button>
<button onclick="show('checks')">Dagelijkse checks</button>
</div>

<div class="content">

<div id="dashboard" class="section active">
<div class="card">
<h2>Dashboard</h2>
<p>Patiënten: <span id="count"></span></p>
</div>
</div>

<div id="patients" class="section">
<div class="card">

<h2>Patiënten</h2>

<input id="search" placeholder="Zoek..." oninput="render()">

<input id="naam" placeholder="Naam">
<input id="leeftijd" placeholder="Leeftijd">
<input id="aandoening" placeholder="Aandoening">
<input id="datum" type="date">

<button onclick="addPatient()">➕ Toevoegen</button>

<div id="patientList"></div>

</div>
</div>

<div id="rooms" class="section">
<div class="card">
<h2>Kamers</h2>
<button onclick="addRoom()">➕ Kamer</button>
<div id="roomList"></div>
</div>
</div>

<div id="checks" class="section">
<div class="card">
<h2>Dagelijkse checks</h2>

<select id="patientSelect"></select>
<input id="checkText" placeholder="Controle">
<button onclick="addCheck()">Opslaan</button>

<div id="checkList"></div>

</div>
</div>

</div>
</div>

</div>

<!-- MODAL -->
<div id="modal">
<div class="modal-box">
<div id="detail"></div>
<button onclick="closeModal()">Sluiten</button>
</div>
</div>

<script>

/* LOGIN */
if(localStorage.getItem("loggedIn")){
document.getElementById("login").style.display="none";
document.getElementById("app").style.display="block";
}

function login(){
let u=user.value,p=pass.value;
if((u=="admin"||u=="dokter")&&p=="1234"){
localStorage.setItem("loggedIn",true);
location.reload();
}else alert("Fout!");
}

function logout(){
localStorage.removeItem("loggedIn");
location.reload();
}

/* DATA */
let patients=JSON.parse(localStorage.getItem("patients"))||[];
let rooms=JSON.parse(localStorage.getItem("rooms"))||[];

/* SAVE */
function save(){
localStorage.setItem("patients",JSON.stringify(patients));
localStorage.setItem("rooms",JSON.stringify(rooms));
}

/* NAV */
function show(id){
document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
document.getElementById(id).classList.add("active");
render();
}

/* ADD PATIENT */
function addPatient(){
patients.push({
naam:naam.value,
leeftijd:leeftijd.value,
aandoening:aandoening.value,
datum:datum.value,
spoed:false,
kamer:null,
medicatie:[],
checks:[]
});
save();render();
}

/* RENDER */
function render(){

let searchInput=document.getElementById("search");
let q=searchInput?searchInput.value.toLowerCase():"";

/* PATIENT LIST */
let list=document.getElementById("patientList");

if(list){
list.innerHTML="";

patients
.map((p,index)=>({p,index}))
.filter(obj=>obj.p.naam.toLowerCase().includes(q))
.forEach(obj=>{

let p=obj.p;
let i=obj.index;

let div=document.createElement("div");

div.innerHTML=`
<b>${p.naam}</b> (${p.leeftijd})<br>
${p.aandoening}<br>
Opname: ${p.datum}<br>
<button onclick="openDetail(${i})">👁️</button>
<button onclick="del(${i})">❌</button>
<hr>
`;

list.appendChild(div);

});
}

/* SELECT */
let sel=document.getElementById("patientSelect");
if(sel){
sel.innerHTML="";
patients.forEach((p,i)=>{
let o=document.createElement("option");
o.value=i;o.innerText=p.naam;
sel.appendChild(o);
});
}

/* CHECKS */
let cl=document.getElementById("checkList");
if(cl){
cl.innerHTML="";
patients.forEach(p=>{
p.checks.forEach(c=>{
let d=document.createElement("div");
d.innerText=c.datum+" - "+p.naam+": "+c.text;
cl.appendChild(d);
});
});
}

/* ROOMS */
let rl=document.getElementById("roomList");
if(rl){
rl.innerHTML="";
rooms.forEach((r,i)=>{
let d=document.createElement("div");
d.innerText=`Kamer ${r.nr} (${r.bezet}/${r.cap})`;

let e=document.createElement("button");
e.innerText="✏️";
e.onclick=()=>{r.cap=prompt("cap",r.cap);save();render();};

let x=document.createElement("button");
x.innerText="❌";
x.onclick=()=>{rooms.splice(i,1);save();render();};

d.append(e,x);
rl.appendChild(d);
});
}

/* STATS */
count.innerText=patients.length;

}

/* DETAIL */
function openDetail(i){
let p=patients[i];

detail.innerHTML=`
<h3>${p.naam}</h3>
Leeftijd: ${p.leeftijd}<br>
Aandoening: ${p.aandoening}<br>
Opname: ${p.datum}<br><br>

<h4>Medicatie</h4>
<button onclick="addMed(${i})">➕</button>
${p.medicatie.join("<br>")}

<h4>Checks</h4>
<button onclick="addCheckDirect(${i})">➕</button>
${p.checks.map(c=>c.datum+" - "+c.text).join("<br>")}
`;

modal.style.display="flex";
}

function closeModal(){
modal.style.display="none";
}

/* EXTRA */
function addMed(i){
let m=prompt("Medicatie");
if(m){
patients[i].medicatie.push(m);
save();
openDetail(i);
}
}

function addCheckDirect(i){
let t=prompt("Check");
if(t){
patients[i].checks.push({
datum:new Date().toLocaleDateString(),
text:t
});
save();
openDetail(i);
}
}

function del(i){
patients.splice(i,1);
save();
render();
}

/* ROOM */
function addRoom(){
let nr=prompt("nr");
let cap=prompt("cap");
rooms.push({nr,cap:Number(cap),bezet:0});
save();render();
}

/* CHECK */
function addCheck(){
let i=patientSelect.value;
patients[i].checks.push({
datum:new Date().toLocaleDateString(),
text:checkText.value
});
save();render();
}

render();

</script>

</body>
</html>
